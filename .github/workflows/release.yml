name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-22.04
            label: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux only)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3
          # Retry with --fix-missing to tolerate mirror cycling: sometimes Ubuntu
          # drops old package versions between image bake and job run, causing
          # 404s on specific point-release .deb files.
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libwebkit2gtk-4.1-dev \
              build-essential \
              curl wget file \
              libxdo-dev libssl-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              pkg-config && break
            echo "apt install attempt $i failed, refreshing package lists..."
            sudo apt-get update -o Acquire::Retries=3
            sleep 5
          done

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: bun install

      - run: bun run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elite-trade-finder-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    # Fire on tag pushes (real releases) and manual dispatch (testing the pipeline).
    # Skip for routine branch pushes so every commit doesn't create a draft release.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Pick a release tag name
        id: tagname
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch has no tag — synthesize one from the short SHA.
            echo "name=dev-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagname.outputs.name }}
          files: dist/**/*
          draft: true
          generate_release_notes: true
