name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: ubuntu-22.04
            label: linux
          - os: ubuntu-latest
            label: linux-arch
            container: archlinux:latest

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch deps (Arch container only)
        if: matrix.label == 'linux-arch'
        run: |
          # Bootstrap keyring before any package install (fresh Arch containers
          # ship with empty /etc/pacman.d/gnupg which breaks signed upgrades).
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            webkit2gtk-4.1 xorg-server-xwayland \
            base-devel rust curl wget file \
            xdotool openssl libayatana-appindicator \
            librsvg pkgconf nodejs npm unzip git sudo \
            gtk3 gdk-pixbuf2 cairo pango harfbuzz \
            glibc patchelf squashfs-tools \
            fuse2 fuse3 appstream libglvnd desktop-file-utils
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Install system deps (Linux only)
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update -o Acquire::Retries=3
          # Retry with --fix-missing to tolerate mirror cycling: sometimes Ubuntu
          # drops old package versions between image bake and job run, causing
          # 404s on specific point-release .deb files.
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libwebkit2gtk-4.1-dev \
              build-essential \
              curl wget file \
              libxdo-dev libssl-dev \
              libayatana-appindicator3-dev \
              librsvg2-dev \
              pkg-config && break
            echo "apt install attempt $i failed, refreshing package lists..."
            sudo apt-get update -o Acquire::Retries=3
            sleep 5
          done

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: bun install

      - name: Build tauri bundles
        shell: bash
        env:
          # linuxdeploy + linuxdeploy-plugin-appimage are AppImages themselves.
          # Inside CI containers (no FUSE) tell them to self-extract. Harmless
          # on the other matrix entries where FUSE is available.
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        run: |
          if [ "${{ matrix.label }}" = "linux-arch" ]; then
            # Skip AppImage on Arch: linuxdeploy's GTK plugin fails inside the
            # archlinux:latest container for reasons Tauri hides. .deb/.rpm are
            # enough — Arch users extract with `bsdtar xf *.rpm` or `ar x *.deb`.
            bun run tauri build --bundles deb rpm
          else
            bun run tauri build
          fi

      - name: Rename Arch artifacts to avoid collision with Ubuntu ones
        if: matrix.label == 'linux-arch'
        shell: bash
        run: |
          # Tag filenames so Ubuntu-built and Arch-built artifacts don't
          # overwrite each other when the release job flattens them.
          cd src-tauri/target/release/bundle
          for f in deb/*.deb rpm/*.rpm; do
            [ -f "$f" ] || continue
            base="${f%.*}"; ext="${f##*.}"
            mv "$f" "${base}-arch.${ext}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: elite-trade-finder-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore

  release:
    needs: build
    # Fire on tag pushes (real releases) and manual dispatch (testing the pipeline).
    # Skip for routine branch pushes so every commit doesn't create a draft release.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Pick a release tag name
        id: tagname
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # workflow_dispatch has no tag — synthesize one from the short SHA.
            echo "name=dev-${{ github.run_number }}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tagname.outputs.name }}
          files: dist/**/*
          draft: true
          generate_release_notes: true
